name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          NODE_ENV: production
          PORT: 3001
          APP_BASE_URL: https://pineneedledesigns.store
          PAYPAL_BOOKING_DEPOSITS_ENABLED: ${{ secrets.PAYPAL_BOOKING_DEPOSITS_ENABLED }}
          PAYPAL_CLIENT_ID: ${{ secrets.PAYPAL_CLIENT_ID }}
          PAYPAL_CLIENT_SECRET: ${{ secrets.PAYPAL_CLIENT_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ vars.RESEND_FROM || 'orders@pineneedledesigns.store' }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          envs: NODE_ENV,PORT,APP_BASE_URL,PAYPAL_BOOKING_DEPOSITS_ENABLED,PAYPAL_CLIENT_ID,PAYPAL_CLIENT_SECRET,RESEND_API_KEY,RESEND_FROM,SESSION_SECRET,MONGODB_URI
          script: |
            set -euo pipefail
            cd ~/pineneedledesigns.website
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            if [ -z "${MONGODB_URI:-}" ]; then
              echo "ERROR: MONGODB_URI secret is empty. Set GitHub Actions secret MONGODB_URI to your DigitalOcean MongoDB connection string."
              exit 1
            fi

            if [ -z "${SESSION_SECRET:-}" ]; then
              echo "ERROR: SESSION_SECRET secret is empty. Set GitHub Actions secret SESSION_SECRET."
              exit 1
            fi

            # Write production env file so the app always loads DigitalOcean MongoDB
            umask 077
            printf '%s\n' \
              "NODE_ENV=production" \
              "PORT=3001" \
              "APP_BASE_URL=https://pineneedledesigns.store" \
              "MONGODB_URI=${MONGODB_URI}" \
              "SESSION_SECRET=${SESSION_SECRET}" \
              "RESEND_API_KEY=${RESEND_API_KEY:-}" \
              "RESEND_FROM=${RESEND_FROM:-orders@pineneedledesigns.store}" \
              "PAYPAL_BOOKING_DEPOSITS_ENABLED=${PAYPAL_BOOKING_DEPOSITS_ENABLED:-false}" \
              "PAYPAL_CLIENT_ID=${PAYPAL_CLIENT_ID:-}" \
              "PAYPAL_CLIENT_SECRET=${PAYPAL_CLIENT_SECRET:-}" \
              > backend/.env

            npm ci --omit=dev --ignore-scripts
            npm run seed -w backend

            # Nginx defaults to a 1 MB request body, which rejects normal product
            # photos before they can reach the app's media upload middleware.
            sudo tee /etc/nginx/conf.d/pineneedledesigns-uploads.conf >/dev/null <<'NGINX'
            client_max_body_size 100M;
            NGINX
            sudo nginx -t
            sudo systemctl reload nginx

            # Reload the running API gracefully so open dashboard forms and saves
            # are not interrupted. Start it only when no existing process exists.
            if pm2 describe server >/dev/null 2>&1; then
              pm2 reload server --update-env
            else
              pm2 start ecosystem.config.cjs --update-env
            fi

            # Do not report a successful deployment until the backend is actually serving traffic.
            healthy=false
            for attempt in $(seq 1 30); do
              if curl --fail --silent --show-error http://127.0.0.1:3001/api/health; then
                healthy=true
                break
              fi
              sleep 1
            done

            if [ "$healthy" != "true" ]; then
              echo "ERROR: Backend failed its health check after 30 seconds."
              pm2 status
              pm2 logs server --lines 100 --nostream || true
              exit 1
            fi

            pm2 save
            pm2 status

            node -e "
              const uri = process.env.MONGODB_URI || '';
              if (!uri) {
                console.error('ERROR: MONGODB_URI is missing in the deploy shell environment.');
                process.exit(1);
              }
              const host = uri.replace(/^mongodb(\\+srv)?:\\/\\//, '').replace(/^[^@]+@/, '').split('/')[0];
              const db = (uri.split('/').pop() || '').split('?')[0] || '(missing)';
              console.log('Deployed MongoDB host:', host);
              console.log('Deployed MongoDB database:', db);
            "
