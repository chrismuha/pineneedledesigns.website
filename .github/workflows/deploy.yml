name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          NODE_ENV: production
          PAYPAL_BOOKING_DEPOSITS_ENABLED: ${{ secrets.PAYPAL_BOOKING_DEPOSITS_ENABLED }}
          PAYPAL_CLIENT_ID: ${{ secrets.PAYPAL_CLIENT_ID }}
          PAYPAL_CLIENT_SECRET: ${{ secrets.PAYPAL_CLIENT_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ vars.RESEND_FROM || 'orders@pineneedledesigns.store' }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          envs: NODE_ENV,PAYPAL_BOOKING_DEPOSITS_ENABLED,PAYPAL_CLIENT_ID,PAYPAL_CLIENT_SECRET,RESEND_API_KEY,RESEND_FROM,SESSION_SECRET,MONGODB_URI
          script: |
            set -e
            cd ~/pineneedledesigns.website
            git fetch origin main
            git reset --hard origin/main
            git clean -fd
            npm ci --omit=dev --ignore-scripts
            pm2 startOrRestart ecosystem.config.cjs --update-env
            pm2 save
